<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background: radial-gradient(circle at top,#1e1b4b,#020617 70%);
color:white;
padding:15px;
}

.logo{
text-align:center;
font-size:26px;
font-weight:700;
margin-bottom:15px;
background:linear-gradient(90deg,#8b5cf6,#6366f1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.box{
background:#0f172a;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

textarea,select,button{
width:100%;
margin-top:8px;
padding:10px;
border-radius:10px;
border:none;
}

textarea{background:#111827;color:white;}

.generate{background:#6366f1;color:white;}
.stop{background:red;color:white;}
.download{background:#22c55e;color:white;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:#0f172a;
padding:12px;
border-radius:12px;
cursor:pointer;
}

.output{
margin-top:15px;
background:#020617;
padding:12px;
border-radius:10px;
min-height:80px;
}
</style>
</head>

<body>

<div class="logo">⚡ Zentrix AI</div>

<div class="box">

<textarea id="text" placeholder="Enter text..."></textarea>

<select id="voice"></select>

<select id="style">
<option value="normal">Normal</option>
<option value="fast">Fast</option>
<option value="slow">Slow</option>
<option value="deep">Deep</option>
</select>

<button class="generate" onclick="speak()">Generate Voice</button>
<button class="stop" onclick="stop()">Stop</button>
<button class="download" onclick="download()">Download</button>

</div>

<div class="grid">
<div class="card" onclick="tool('script')">✍️ Script</div>
<div class="card" onclick="tool('caption')">📝 Caption</div>
<div class="card" onclick="tool('idea')">💡 Idea</div>
<div class="card" onclick="tool('title')">🔥 Title</div>
<div class="card" onclick="tool('hashtag')"># Hashtag</div>
<div class="card" onclick="tool('story')">📜 Story</div>
</div>

<div class="output" id="out">Result yaha dikhega...</div>

<script>

/* VOICE */
let voices=[];

speechSynthesis.onvoiceschanged=()=>{
voices=speechSynthesis.getVoices();
voice.innerHTML="";
voices.forEach((v,i)=>{
let o=document.createElement("option");
o.value=i;
o.text=v.name;
voice.appendChild(o);
});
};

function speak(){
let msg=new SpeechSynthesisUtterance(text.value);
msg.voice=voices[voice.value];

let s=style.value;
if(s=="fast") msg.rate=1.5;
if(s=="slow") msg.rate=0.7;
if(s=="deep") msg.pitch=0.6;

speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

function stop(){
speechSynthesis.cancel();
}

/* DOWNLOAD FUNNY */
function download(){
alert("😂 Download chahiye? \nScreen record kar le bhai!\n\n— Tumhara dost, Himanshu Gupta 😎");
}

/* FEATURES */
function tool(t){
let txt=text.value;
if(!txt){out.innerHTML="Pehle text likh bhai";return;}

if(t=="script"){
out.innerHTML="Hook: "+txt+"...\nStory: Ye ek kahani hai...\nEnd: Follow karo!";
}

if(t=="caption"){
out.innerHTML=txt+"\n#viral #reels #fyp";
}

if(t=="idea"){
out.innerHTML="Idea: "+txt+" par video banao";
}

if(t=="title"){
out.innerHTML=txt+" | Must Watch 😱";
}

if(t=="hashtag"){
out.innerHTML="#viral #trend #shorts";
}

if(t=="story"){
out.innerHTML="Ek din "+txt+" hua...";
}

}

</script>

</body>
</html>

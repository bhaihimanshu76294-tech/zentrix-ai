<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix AI</title>

<style>
body{
margin:0;
font-family: 'Poppins', sans-serif;
background: radial-gradient(circle at top,#1e1b4b,#020617 70%);
color:white;
}

h1{
text-align:center;
padding:20px;
font-size:28px;
background: linear-gradient(90deg,#8b5cf6,#6366f1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.container{
padding:15px;
}

/* TTS BOX */
.tts-box{
background: linear-gradient(145deg,#0f172a,#020617);
padding:15px;
border-radius:16px;
box-shadow:0 0 20px rgba(99,102,241,0.2);
margin-bottom:20px;
}

textarea{
width:100%;
height:80px;
border-radius:10px;
border:none;
padding:10px;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.generate{
background: linear-gradient(90deg,#7c3aed,#6366f1);
color:white;
}

.stop{
background:red;
color:white;
}

/* FEATURES GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.feature{
background: linear-gradient(145deg,#0f172a,#020617);
padding:15px;
border-radius:14px;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.feature:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(99,102,241,0.4);
}

.icon{
background:#111827;
padding:10px;
border-radius:10px;
color:#6366f1;
}

/* OUTPUT */
.output{
margin-top:20px;
background:#000;
padding:12px;
border-radius:10px;
min-height:80px;
}
</style>
</head>

<body>

<h1>⚡ Zentrix AI</h1>

<div class="container">

<!-- TEXT TO SPEECH -->
<div class="tts-box">
<textarea id="text" placeholder="Enter text..."></textarea>

<button class="generate" onclick="speak()">Generate Voice</button>
<button class="stop" onclick="stopVoice()">Stop</button>
<button onclick="downloadAudio()">Download</button>
</div>

<!-- FEATURES -->
<div class="grid">

<div class="feature" onclick="runFeature('script')">
<div class="icon">✍</div> Script
</div>

<div class="feature" onclick="runFeature('caption')">
<div class="icon">📝</div> Caption
</div>

<div class="feature" onclick="runFeature('idea')">
<div class="icon">💡</div> Idea
</div>

<div class="feature" onclick="runFeature('title')">
<div class="icon">🔥</div> Title
</div>

<div class="feature" onclick="runFeature('hook')">
<div class="icon">🧠</div> Hook
</div>

<div class="feature" onclick="runFeature('hashtag')">
<div class="icon">#</div> Hashtag
</div>

<div class="feature" onclick="runFeature('rewrite')">
<div class="icon">🔁</div> Rewrite
</div>

<div class="feature" onclick="runFeature('story')">
<div class="icon">📜</div> Story
</div>

<div class="feature" onclick="runFeature('keyword')">
<div class="icon">🎯</div> Keyword
</div>

</div>

<div class="output" id="output"></div>

</div>

<script>
let synth = window.speechSynthesis;

function speak(){
let text = document.getElementById("text").value;
let utter = new SpeechSynthesisUtterance(text);
synth.speak(utter);
}

function stopVoice(){
synth.cancel();
}

function downloadAudio(){
alert("Direct download possible nahi hai 😅 Screen record use karo");
}

function runFeature(type){
let text = document.getElementById("text").value;
let output = document.getElementById("output");

if(!text){
output.innerHTML="⚠️ Pehle text likh";
return;
}

if(type=="script"){
output.innerHTML="🎬 Script:\nHook: "+text+"...\nMain: Ye ek kahani hai...\nEnd: Follow karo!";
}

if(type=="caption"){
output.innerHTML="📸 "+text+" 🔥\n#viral #reels #trending";
}

if(type=="idea"){
output.innerHTML="💡 Idea:\n"+text+" par reel banao";
}

if(type=="title"){
output.innerHTML="🔥 "+text+" | Must Watch 😱";
}

if(type=="hook"){
output.innerHTML="🧠 Agar tumne ye nahi dekha to regret karoge!";
}

if(type=="hashtag"){
output.innerHTML="#viral #fyp #trend #shorts";
}

if(type=="rewrite"){
output.innerHTML=text.toUpperCase();
}

if(type=="story"){
output.innerHTML="📖 Ek kahani: "+text+" aur sab badal gaya...";
}

if(type=="keyword"){
output.innerHTML="🎯 "+text+", viral, trending";
}
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Zentrix AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 30px;
}

textarea {
  width: 90%;
  height: 100px;
  margin: 10px;
  border-radius: 10px;
  padding: 10px;
  border: none;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: cyan;
  color: black;
  font-weight: bold;
}

button:hover {
  opacity: 0.8;
}
</style>

</head>

<body>

<h1>Zentrix AI 🔥</h1>

<textarea id="text" placeholder="Type your text..."></textarea><br>

<button onclick="speak()">🎤 Speak</button>
<button onclick="stop()">⛔ Stop</button>

<script>
function speak() {
  let text = document.getElementById("text").value;
  let msg = new SpeechSynthesisUtterance(text);
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

function stop() {
  speechSynthesis.cancel();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Zentrix AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0b1a3a, #000);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 25px;
      font-size: 28px;
    }

    .container {
      background: rgba(255,255,255,0.05);
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    textarea {
      width: 95%;
      height: 120px;
      border-radius: 10px;
      padding: 10px;
      border: none;
      margin-top: 10px;
    }

    select, button {
      margin: 8px;
      padding: 12px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: linear-gradient(45deg, #00ffcc, #00ccff);
      color: black;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.8;
    }

    .tag {
      color: #00ffcc;
      font-size: 12px;
    }

    .loader {
      display: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Zentrix AI 🔥</h1>
<p class="tag">Best result: English / Hinglish use kare</p>

<div class="container">

<textarea id="text" placeholder="Type your text here..."></textarea><br>

<select id="voiceSelect"></select><br>

<select id="rate">
  <option value="1">Normal Speed</option>
  <option value="0.8">Slow</option>
  <option value="1.3">Fast</option>
</select>

<select id="pitch">
  <option value="1">Normal Voice</option>
  <option value="0.8">Deep</option>
  <option value="1.5">Sharp</option>
</select>

<br>

<button onclick="speak()">🎤 Generate</button>
<button onclick="stopVoice()">⛔ Stop</button>

<div class="loader" id="loading">Generating...</div>

</div>

<script>
let voices = [];

function loadVoices() {
  voices = speechSynthesis.getVoices();
  let select = document.getElementById("voiceSelect");
  select.innerHTML = "";

  voices.forEach((v, i) => {
    let option = document.createElement("option");
    option.value = i;
    option.text = v.name + " (" + v.lang + ")";
    select.appendChild(option);
  });

  let best = voices.findIndex(v => v.lang.includes("en"));
  if (best >= 0) select.value = best;
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak() {
  let text = document.getElementById("text").value;
  if (!text) {
    alert("Text likh bhai 😅");
    return;
  }

  document.getElementById("loading").style.display = "block";

  let voiceIndex = document.getElementById("voiceSelect").value;
  let rate = document.getElementById("rate").value;
  let pitch = document.getElementById("pitch").value;

  let speech = new SpeechSynthesisUtterance(text);
  speech.voice = voices[voiceIndex];
  speech.rate = rate;
  speech.pitch = pitch;

  speech.onend = () => {
    document.getElementById("loading").style.display = "none";
  };

  speechSynthesis.cancel();
  speechSynthesis.speak(speech);
}

function stopVoice(){
  speechSynthesis.cancel();
  document.getElementById("loading").style.display = "none";
}
</script>

</body>
</html>

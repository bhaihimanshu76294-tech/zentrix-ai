<!DOCTYPE html>
<html>
<head>
<title>Zentrix Voice AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:#0f172a;
 color:white;
 text-align:center;
}

h1{
 margin-top:20px;
 font-size:28px;
}

.box{
 background:#1e293b;
 margin:15px;
 padding:20px;
 border-radius:15px;
 box-shadow:0 0 20px rgba(0,0,0,0.5);
}

textarea{
 width:90%;
 height:120px;
 border-radius:10px;
 padding:10px;
 border:none;
 outline:none;
}

select,button{
 margin:8px;
 padding:10px;
 border-radius:10px;
 border:none;
}

button{
 background:#38bdf8;
 color:black;
 font-weight:bold;
}

button:hover{
 background:#0ea5e9;
}

.history{
 max-height:150px;
 overflow:auto;
 text-align:left;
 margin-top:10px;
}

.voice-count{
 font-size:14px;
 color:#94a3b8;
}
</style>
</head>

<body>

<h1>🎤 Zentrix Voice AI</h1>

<div class="box">

<textarea id="text" placeholder="Type your text..."></textarea><br>

<select id="voice"></select><br>

<div class="voice-count" id="voiceCount"></div>

<select id="rate">
<option value="1">Normal Speed</option>
<option value="0.8">Slow</option>
<option value="1.3">Fast</option>
</select>

<select id="pitch">
<option value="1">Normal Pitch</option>
<option value="0.8">Deep</option>
<option value="1.5">Sharp</option>
</select>

<br>

<button onclick="generate()">🎤 Generate</button>
<button onclick="stop()">⛔ Stop</button>

</div>

<div class="box">
<h3>History</h3>
<div id="history" class="history"></div>
</div>

<script>
let voices=[];

function loadVoices(){
 voices=speechSynthesis.getVoices();
 let v=document.getElementById("voice");
 v.innerHTML="";

 voices.forEach((voice,i)=>{
  let opt=document.createElement("option");
  opt.value=i;
  opt.text=voice.name + " ("+voice.lang+")";
  v.appendChild(opt);
 });

 document.getElementById("voiceCount").innerText =
 "Available Voices: " + voices.length;
}

speechSynthesis.onvoiceschanged = loadVoices;

function generate(){

 let text=document.getElementById("text").value;
 if(!text) return alert("Enter text");

 let msg=new SpeechSynthesisUtterance(text);
 msg.voice=voices[document.getElementById("voice").value];
 msg.rate=document.getElementById("rate").value;
 msg.pitch=document.getElementById("pitch").value;

 speechSynthesis.cancel();
 speechSynthesis.speak(msg);

 addHistory(text);
}

function stop(){
 speechSynthesis.cancel();
}

function addHistory(text){
 let h=document.getElementById("history");
 let div=document.createElement("div");
 div.textContent="• " + text;
 h.prepend(div);
}
</script>

</body>
</html>

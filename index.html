<!DOCTYPE html>
<html>
<head>
  <title>Zentrix AI Voice</title>
  <style>
    body {
      background: #0b1a3a;
      color: white;
      text-align: center;
      font-family: sans-serif;
      padding: 40px;
    }
    textarea {
      width: 80%;
      height: 120px;
      border-radius: 10px;
      padding: 10px;
    }
    select, button {
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }
    button {
      background: green;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Zentrix AI Voice 🔥</h1>

<textarea id="text" placeholder="Yaha text likho..."></textarea><br>

<select id="lang">
  <option value="hi-IN">Hindi</option>
  <option value="en-US">English</option>
</select>

<select id="speed">
  <option value="1">Normal Speed</option>
  <option value="0.7">Slow</option>
  <option value="1.3">Fast</option>
</select>

<select id="pitch">
  <option value="1">Normal Voice</option>
  <option value="0.7">Deep Voice</option>
  <option value="1.5">Sharp Voice</option>
</select>

<br>

<button onclick="speak()">Generate Voice</button>

<script>
function speak(){
  let text = document.getElementById("text").value;
  let lang = document.getElementById("lang").value;
  let speed = document.getElementById("speed").value;
  let pitch = document.getElementById("pitch").value;

  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = lang;
  speech.rate = speed;
  speech.pitch = pitch;

  window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>

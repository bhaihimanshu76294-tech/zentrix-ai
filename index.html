<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix AI</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background: radial-gradient(circle at top,#1e1b4b,#020617);
 color:white;
}

.logo{
 text-align:center;
 padding:15px;
 font-size:22px;
 font-weight:bold;
 color:#8b5cf6;
}

.tts,.card{
 background:#0f172a;
 margin:10px;
 padding:15px;
 border-radius:15px;
}

textarea,input,select{
 width:100%;
 padding:12px;
 margin-top:10px;
 border-radius:10px;
 border:none;
}

button{
 width:100%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:10px;
 font-weight:bold;
}

.generate{background:linear-gradient(90deg,#7c3aed,#6366f1);color:white;}
.stop{background:red;color:white;}
.copy{background:green;color:white;}

.features{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 padding:10px;
}

.box{
 background:#0f172a;
 padding:15px;
 border-radius:12px;
 cursor:pointer;
 display:flex;
 gap:10px;
 align-items:center;
}

.icon{
 background:#1e293b;
 padding:10px;
 border-radius:10px;
 color:#60a5fa;
}

.section{display:none;padding:10px;}
.show{display:block;}

.output{
 background:#0f172a;
 padding:10px;
 margin-top:10px;
 border-radius:10px;
}

video{
 width:100%;
 margin-top:10px;
 border-radius:10px;
}
</style>
</head>

<body>

<div class="logo">⚡ Zentrix AI</div>

<!-- VOICE -->
<div class="tts">
<textarea id="text" placeholder="Enter text..."></textarea>
<button class="generate" onclick="speak()">Generate Voice</button>
<button class="stop" onclick="speechSynthesis.cancel()">Stop</button>
</div>

<!-- FEATURES -->
<div class="features">
<div class="box" onclick="openTool('script')"><span class="icon">✍️</span>Script</div>
<div class="box" onclick="openTool('caption')"><span class="icon">📝</span>Caption</div>
<div class="box" onclick="openTool('idea')"><span class="icon">💡</span>Idea</div>
<div class="box" onclick="openTool('title')"><span class="icon">🔥</span>Title</div>
<div class="box" onclick="openTool('hook')"><span class="icon">🧠</span>Hook</div>
<div class="box" onclick="openTool('hashtag')"><span class="icon">#️⃣</span>Hashtag</div>
<div class="box" onclick="openTool('rewrite')"><span class="icon">🔁</span>Rewrite</div>
<div class="box" onclick="openTool('story')"><span class="icon">📜</span>Story</div>
<div class="box" onclick="openTool('keyword')"><span class="icon">🎯</span>Keyword</div>
</div>

<!-- SCRIPT -->
<div id="script" class="section card">
<input id="topic" placeholder="Enter topic">
<button class="generate" onclick="genScript()">Generate</button>
<div id="scriptOut" class="output"></div>
</div>

<!-- CAPTION (AUTO FEEL) -->
<div id="caption" class="section card">
<input type="file" accept="video/*" id="videoInput">
<textarea id="capText" placeholder="Optional text..."></textarea>

<button class="generate" onclick="genCaption()">Generate Caption</button>

<video id="videoPreview" controls></video>

<div id="capOut" class="output"></div>
<button class="copy" onclick="copy('capOut')">Copy</button>
</div>

<!-- OTHER -->
<div id="idea" class="section card"><button onclick="idea()">Generate</button><div id="ideaOut" class="output"></div></div>
<div id="title" class="section card"><button onclick="titleGen()">Generate</button><div id="titleOut" class="output"></div></div>
<div id="hook" class="section card"><button onclick="hookGen()">Generate</button><div id="hookOut" class="output"></div></div>
<div id="hashtag" class="section card"><button onclick="tag()">Generate</button><div id="tagOut" class="output"></div></div>

<div id="rewrite" class="section card">
<textarea id="rewriteInput"></textarea>
<button onclick="rewrite()">Rewrite</button>
<div id="rewriteOut" class="output"></div>
</div>

<div id="story" class="section card"><button onclick="story()">Generate</button><div id="storyOut" class="output"></div></div>
<div id="keyword" class="section card"><button onclick="keyword()">Generate</button><div id="keyOut" class="output"></div></div>

<script>

/* NAV */
function openTool(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'));
 document.getElementById(id).classList.add('show');
}

/* VOICE */
function speak(){
 let msg=new SpeechSynthesisUtterance(text.value);
 speechSynthesis.speak(msg);
}

/* SCRIPT SMART */
function genScript(){
 let t=topic.value.toLowerCase();
 let out="";

 if(t.includes("horror")){
  out="रात के 2 बजे... अचानक दरवाज़ा खुद खुल गया...";
 }else if(t.includes("motivation")){
  out="अगर जिंदगी बदलनी है... तो आज से मेहनत शुरू करो...";
 }else{
  out="आज हम बात करेंगे "+t+" के बारे में...";
 }

 scriptOut.innerText=out;
}

/* CAPTION JUGAAD */
function genCaption(){
 let video=document.getElementById("videoInput").files[0];

 if(video){
  let url=URL.createObjectURL(video);
  videoPreview.src=url;
 }

 let captions=[
  "🔥 Watch till end 😱 #viral",
  "ये वीडियो आपको चौंका देगा 😳",
  "Ending miss मत करना 😱🔥",
  "100% real story 😳"
 ];

 capOut.innerText=captions[Math.floor(Math.random()*captions.length)];
}

/* OTHERS */
function idea(){ideaOut.innerText="Trending reel idea 🔥";}
function titleGen(){titleOut.innerText="Shocking Truth 😱";}
function hookGen(){hookOut.innerText="Wait till end 😳";}
function tag(){tagOut.innerText="#viral #fyp #reels";}
function rewrite(){rewriteOut.innerText="Better: "+rewriteInput.value;}
function story(){storyOut.innerText="Once upon a time...";}
function keyword(){keyOut.innerText="viral trending reels";}

/* COPY */
function copy(id){
 let t=document.getElementById(id).innerText;
 navigator.clipboard.writeText(t);
 alert("Copied!");
}

</script>

</body>
</html>

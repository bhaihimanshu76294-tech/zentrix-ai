<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix AI</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#1a1a3d,#000);
color:white;
}

h1{
text-align:center;
padding:20px;
color:#8a6cff;
}

.container{
padding:15px;
}

.card{
background:#11182c;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

textarea{
width:100%;
height:80px;
border-radius:10px;
border:none;
padding:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

.generate{
background:linear-gradient(90deg,#7b5cff,#9d7bff);
color:white;
}

.stop{
background:red;
color:white;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.feature{
background:#0f172a;
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

.output{
background:#000;
padding:10px;
margin-top:10px;
border-radius:10px;
min-height:60px;
}
</style>
</head>

<body>

<h1>⚡ Zentrix AI</h1>

<div class="container">

<!-- TEXT TO SPEECH -->
<div class="card">
<textarea id="text" placeholder="Enter text..."></textarea>

<button class="generate" onclick="speak()">Generate Voice</button>
<button class="stop" onclick="stopVoice()">Stop</button>
<button onclick="downloadAudio()">Download</button>
</div>

<!-- FEATURES -->
<div class="grid">

<div class="feature" onclick="runFeature('script')">✍ Script</div>
<div class="feature" onclick="runFeature('caption')">📝 Caption</div>
<div class="feature" onclick="runFeature('idea')">💡 Idea</div>
<div class="feature" onclick="runFeature('title')">🔥 Title</div>
<div class="feature" onclick="runFeature('hook')">🧠 Hook</div>
<div class="feature" onclick="runFeature('hashtag')"># Hashtag</div>
<div class="feature" onclick="runFeature('rewrite')">🔁 Rewrite</div>
<div class="feature" onclick="runFeature('story')">📜 Story</div>
<div class="feature" onclick="runFeature('keyword')">🎯 Keyword</div>

</div>

<div class="output" id="output"></div>

</div>

<script>
let synth = window.speechSynthesis;

function speak(){
let text = document.getElementById("text").value;
let utter = new SpeechSynthesisUtterance(text);
synth.speak(utter);
}

function stopVoice(){
synth.cancel();
}

// DOWNLOAD (record trick)
function downloadAudio(){
alert("Browser voice direct download possible nahi 😅\nScreen Recorder use karo bhai");
}

// FEATURES LOGIC
function runFeature(type){
let text = document.getElementById("text").value;
let output = document.getElementById("output");

if(!text){
output.innerHTML="⚠️ Pehle text likh bhai";
return;
}

if(type=="script"){
output.innerHTML="🎬 Script:\nEk horror kahani...\nRaat ke 2 baje darwaza khula...";
}

if(type=="caption"){
output.innerHTML="📸 Caption:\n"+text+" 😍🔥\n#viral #trending #reels";
}

if(type=="idea"){
output.innerHTML="💡 Idea:\nYouTube Shorts idea: "+text+" explain karo";
}

if(type=="title"){
output.innerHTML="🔥 Title:\n"+text+" | Must Watch 😱";
}

if(type=="hook"){
output.innerHTML="🧠 Hook:\nAgar tum ye nahi dekhoge to regret karoge...";
}

if(type=="hashtag"){
output.innerHTML="#viral #fyp #trend #reels #youtube";
}

if(type=="rewrite"){
output.innerHTML="🔁 Rewrite:\n"+text.split("").reverse().join("");
}

if(type=="story"){
output.innerHTML="📖 Story:\nEk ladka tha... "+text+" aur fir sab badal gaya...";
}

if(type=="keyword"){
output.innerHTML="🎯 Keywords:\n"+text+", viral, trending";
}
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zentrix AI</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
}

.container{
  padding:20px;
}

h1{
  text-align:center;
  color:#8f7cff;
}

textarea{
  width:100%;
  height:100px;
  border-radius:10px;
  padding:10px;
  border:none;
  outline:none;
}

select,button{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

.generate{
  background:#6c63ff;
  color:white;
}

.stop{
  background:red;
  color:white;
}

.download{
  background:green;
  color:white;
}

.features{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:20px;
}

.feature{
  background:#111827;
  padding:15px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

#output{
  margin-top:20px;
  background:#111;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Zentrix AI</h1>

<textarea id="text" placeholder="Enter text..."></textarea>

<button class="generate" onclick="speak()">Generate Voice</button>
<button class="stop" onclick="stopVoice()">Stop</button>
<button class="download" onclick="downloadAudio()">Download</button>

<div class="features">

<div class="feature" onclick="useFeature('script')">✍ Script</div>
<div class="feature" onclick="useFeature('caption')">📝 Caption</div>
<div class="feature" onclick="useFeature('idea')">💡 Idea</div>
<div class="feature" onclick="useFeature('title')">🔥 Title</div>
<div class="feature" onclick="useFeature('hook')">🧠 Hook</div>
<div class="feature" onclick="useFeature('hashtag')"># Hashtag</div>
<div class="feature" onclick="useFeature('story')">📜 Story</div>
<div class="feature" onclick="useFeature('keyword')">🎯 Keyword</div>
<div class="feature" onclick="useFeature('intro')">🎬 Intro</div>
<div class="feature" onclick="useFeature('outro')">🏁 Outro</div>
<div class="feature" onclick="useFeature('viral')">🚀 Viral Line</div>
<div class="feature" onclick="useFeature('facts')">📊 Facts</div>
<div class="feature" onclick="useFeature('motivation')">💪 Motivation</div>
<div class="feature" onclick="useFeature('dialogue')">🎭 Dialogue</div>
<div class="feature" onclick="useFeature('reply')">💬 Reply</div>
<div class="feature" onclick="useFeature('bio')">📌 Bio</div>
<div class="feature" onclick="useFeature('headline')">📰 Headline</div>
<div class="feature" onclick="useFeature('cta')">📣 CTA</div>

</div>

<div id="output"></div>

</div>

<script>

// 🎤 Voice
let utter;

function speak(){
  let text = document.getElementById("text").value;
  utter = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(utter);
}

function stopVoice(){
  speechSynthesis.cancel();
}

// 😂 Custom Popup (No Gmail issue)
function downloadAudio(){
  showPopup("😂 Screen record kar le bhai!\n— Himanshu Gupta 😎");
}

function showPopup(msg){
  let div = document.createElement("div");
  div.innerHTML = `
    <div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:#111;color:white;padding:20px;border-radius:10px;text-align:center;">
      <p>${msg}</p>
      <button onclick="this.parentElement.remove()">OK</button>
    </div>`;
  document.body.appendChild(div);
}

// ⚡ FEATURES LOGIC
function useFeature(type){
  let input = document.getElementById("text").value.trim();
  let output = document.getElementById("output");

  if(!input){
    output.innerText="⚠️ Pehle text likh bhai!";
    return;
  }

  let result="";

  if(type=="title") result="🔥 "+input.toUpperCase()+" | Must Watch 😱";
  else if(type=="hashtag") result=input.split(" ").map(w=>"#"+w).join(" ");
  else if(type=="caption") result=input+" 😍🔥 Follow for more!";
  else if(type=="script") result="Intro:\n"+input+"\n\nMiddle:\nStory build...\n\nEnd:\nLike & Subscribe!";
  else if(type=="idea") result="💡 Idea: "+input+" par reel banao!";
  else if(type=="hook") result="😱 Kya tum jaante ho? "+input;
  else if(type=="story") result="Ek din... "+input+" aur sab badal gaya...";
  else if(type=="keyword") result=input.split(" ").join(", ");
  else if(type=="intro") result="🎬 Aaj hum baat karenge "+input+" ke baare me...";
  else if(type=="outro") result="🙏 Thanks for watching! Like Share Subscribe!";
  else if(type=="viral") result="🚀 Ye video aapki soch badal dega: "+input;
  else if(type=="facts") result="📊 Fact: "+input+" ek interesting topic hai!";
  else if(type=="motivation") result="💪 Kabhi haar mat maan! "+input;
  else if(type=="dialogue") result="🎭 'Tum samajh nahi paoge... "+input+"'";
  else if(type=="reply") result="💬 Thanks bhai ❤️";
  else if(type=="bio") result="📌 Creator | "+input+" | Follow now 🚀";
  else if(type=="headline") result="📰 Breaking: "+input;
  else if(type=="cta") result="📣 Abhi follow karo aur support karo!";

  output.innerText=result;
}

</script>

</body>
</html>

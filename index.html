<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix AI</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background: radial-gradient(circle at top,#1e1b4b,#020617);
 color:white;
}

/* HEADER */
.logo{
 text-align:center;
 padding:15px;
 font-size:22px;
 font-weight:bold;
 color:#8b5cf6;
}

/* TTS BOX */
.tts{
 background:#0f172a;
 margin:10px;
 padding:15px;
 border-radius:15px;
}

textarea,select,input{
 width:100%;
 padding:12px;
 margin-top:10px;
 border-radius:10px;
 border:none;
}

button{
 width:100%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:10px;
 font-weight:bold;
}

.generate{background:linear-gradient(90deg,#7c3aed,#6366f1);color:white;}
.stop{background:red;color:white;}
.copy{background:green;color:white;}

/* FEATURES GRID */
.features{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:12px;
 padding:10px;
}

.box{
 background:#0f172a;
 padding:15px;
 border-radius:15px;
 cursor:pointer;
 display:flex;
 align-items:center;
 gap:10px;
 font-weight:bold;
}

.icon{
 background:#1e293b;
 padding:10px;
 border-radius:10px;
 color:#60a5fa;
}

/* SECTIONS */
.section{
 display:none;
 padding:10px;
}

.show{display:block;}

.output{
 background:#0f172a;
 padding:10px;
 margin-top:10px;
 border-radius:10px;
}
</style>
</head>

<body>

<div class="logo">⚡ Zentrix AI</div>

<!-- 🔥 TEXT TO SPEECH (TOP) -->
<div class="tts">
<textarea id="text" placeholder="Enter text..."></textarea>

<select id="style">
<option value="normal">Normal</option>
<option value="deep">Deep</option>
<option value="fast">Fast</option>
<option value="slow">Slow</option>
</select>

<button class="generate" onclick="speak()">Generate</button>
<button class="stop" onclick="stop()">Stop</button>
</div>

<!-- 🔥 FEATURES -->
<div class="features">

<div class="box" onclick="openTool('script')">
<span class="icon">✍️</span> Script
</div>

<div class="box" onclick="openTool('caption')">
<span class="icon">📝</span> Caption
</div>

<div class="box" onclick="openTool('idea')">
<span class="icon">💡</span> Ideas
</div>

<div class="box" onclick="openTool('title')">
<span class="icon">🔥</span> Title
</div>

<div class="box" onclick="openTool('hook')">
<span class="icon">🧠</span> Hook
</div>

<div class="box" onclick="openTool('hashtag')">
<span class="icon">#️⃣</span> Hashtag
</div>

<div class="box" onclick="openTool('rewrite')">
<span class="icon">🔁</span> Rewrite
</div>

<div class="box" onclick="openTool('story')">
<span class="icon">📜</span> Story
</div>

<div class="box" onclick="openTool('idea')">
<span class="icon">🎬</span> Video Idea
</div>

<div class="box" onclick="openTool('tips')">
<span class="icon">📊</span> Tips
</div>

<div class="box" onclick="openTool('texttool')">
<span class="icon">🔤</span> Text Tool
</div>

<div class="box" onclick="openTool('keyword')">
<span class="icon">🎯</span> Keyword
</div>

</div>

<!-- 🔥 SCRIPT -->
<div id="script" class="section">
<input id="topic" placeholder="Enter topic">
<button class="generate" onclick="genScript()">Generate</button>
<div id="scriptOut" class="output"></div>
<button class="copy" onclick="copyText('scriptOut')">Copy</button>
</div>

<!-- CAPTION -->
<div id="caption" class="section">
<input id="capInput" placeholder="Enter topic">
<button class="generate" onclick="genCaption()">Generate</button>
<div id="capOut" class="output"></div>
<button class="copy" onclick="copyText('capOut')">Copy</button>
</div>

<!-- IDEA -->
<div id="idea" class="section">
<button class="generate" onclick="genIdea()">Generate</button>
<div id="ideaOut" class="output"></div>
</div>

<!-- TITLE -->
<div id="title" class="section">
<button class="generate" onclick="genTitle()">Generate</button>
<div id="titleOut" class="output"></div>
</div>

<!-- HOOK -->
<div id="hook" class="section">
<button class="generate" onclick="genHook()">Generate</button>
<div id="hookOut" class="output"></div>
</div>

<!-- HASHTAG -->
<div id="hashtag" class="section">
<button class="generate" onclick="genTag()">Generate</button>
<div id="tagOut" class="output"></div>
</div>

<!-- REWRITE -->
<div id="rewrite" class="section">
<textarea id="rewriteInput" placeholder="Enter text"></textarea>
<button class="generate" onclick="rewrite()">Rewrite</button>
<div id="rewriteOut" class="output"></div>
</div>

<!-- STORY -->
<div id="story" class="section">
<button class="generate" onclick="genStory()">Generate</button>
<div id="storyOut" class="output"></div>
</div>

<!-- TIPS -->
<div id="tips" class="section">
<button class="generate" onclick="genTips()">Generate</button>
<div id="tipsOut" class="output"></div>
</div>

<!-- TEXT TOOL -->
<div id="texttool" class="section">
<textarea id="toolText"></textarea>
<button class="generate" onclick="upper()">UPPERCASE</button>
<button class="generate" onclick="lower()">lowercase</button>
</div>

<!-- KEYWORD -->
<div id="keyword" class="section">
<button class="generate" onclick="genKeyword()">Generate</button>
<div id="keyOut" class="output"></div>
</div>

<script>

function openTool(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'));
 document.getElementById(id).classList.add('show');
 window.scrollTo(0,document.body.scrollHeight);
}

/* VOICE */
function speak(){
 let msg=new SpeechSynthesisUtterance(document.getElementById("text").value);
 let s=document.getElementById("style").value;

 if(s=="deep"){msg.pitch=0.6;}
 if(s=="fast"){msg.rate=1.4;}
 if(s=="slow"){msg.rate=0.7;}

 speechSynthesis.cancel();
 speechSynthesis.speak(msg);
}

function stop(){speechSynthesis.cancel();}

/* GENERATORS */
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}

function genScript(){
 document.getElementById("scriptOut").innerText=rand(["Amazing story","Shocking truth","Viral script"]);
}

function genCaption(){
 document.getElementById("capOut").innerText=rand(["🔥 Viral caption","#Trending now","Must watch"]);
}

function genIdea(){
 document.getElementById("ideaOut").innerText=rand(["Reel idea","Story idea","Content idea"]);
}

function genTitle(){
 document.getElementById("titleOut").innerText=rand(["Top secret 😱","Must watch 🔥"]);
}

function genHook(){
 document.getElementById("hookOut").innerText=rand(["Wait till end...","You won't believe this"]);
}

function genTag(){
 document.getElementById("tagOut").innerText="#viral #reels #fyp";
}

function rewrite(){
 let t=document.getElementById("rewriteInput").value;
 document.getElementById("rewriteOut").innerText="Better: "+t;
}

function genStory(){
 document.getElementById("storyOut").innerText="Once upon a time...";
}

function genTips(){
 document.getElementById("tipsOut").innerText="Post daily & use hooks";
}

function upper(){
 let t=document.getElementById("toolText").value;
 document.getElementById("toolText").value=t.toUpperCase();
}

function lower(){
 let t=document.getElementById("toolText").value;
 document.getElementById("toolText").value=t.toLowerCase();
}

function genKeyword(){
 document.getElementById("keyOut").innerText="viral, reels, trending";
}

function copyText(id){
 let text=document.getElementById(id).innerText;
 navigator.clipboard.writeText(text);
 alert("Copied!");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Zentrix AI Voice</title>
  <style>
    body {
      background: #0b1a3a;
      color: white;
      text-align: center;
      font-family: sans-serif;
      padding: 30px;
    }
    textarea {
      width: 90%;
      height: 120px;
      border-radius: 10px;
      padding: 10px;
      margin: 10px;
    }
    select, button {
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
      border: none;
    }
    button {
      background: green;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Zentrix AI Voice 🔥</h1>

<textarea id="text" placeholder="Type text here..."></textarea><br>

<select id="voiceSelect"></select><br>

<select id="rate">
  <option value="1">Normal</option>
  <option value="0.8">Slow</option>
  <option value="1.3">Fast</option>
</select>

<select id="pitch">
  <option value="1">Normal</option>
  <option value="0.8">Deep</option>
  <option value="1.5">Sharp</option>
</select>

<br>

<button onclick="speak()">Generate Voice</button>

<script>
let voices = [];

function loadVoices() {
  voices = speechSynthesis.getVoices();
  let select = document.getElementById("voiceSelect");
  select.innerHTML = "";

  voices.forEach((voice, i) => {
    let option = document.createElement("option");
    option.value = i;
    option.text = voice.name + " (" + voice.lang + ")";
    select.appendChild(option);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak() {
  let text = document.getElementById("text").value;
  let voiceIndex = document.getElementById("voiceSelect").value;
  let rate = document.getElementById("rate").value;
  let pitch = document.getElementById("pitch").value;

  let speech = new SpeechSynthesisUtterance(text);
  speech.voice = voices[voiceIndex];
  speech.rate = rate;
  speech.pitch = pitch;

  speechSynthesis.speak(speech);
}
</script>

</body>
</html>

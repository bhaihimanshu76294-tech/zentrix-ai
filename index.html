<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix AI</title>

<style>
body{
 margin:0;
 font-family: 'Segoe UI', sans-serif;
 background: radial-gradient(circle at top, #1e1b4b, #020617 70%);
 color:white;
}

nav{
 display:flex;
 justify-content:space-between;
 padding:15px;
}

.logo{
 font-size:20px;
 font-weight:bold;
 background:linear-gradient(45deg,#8b5cf6,#22d3ee);
 -webkit-background-clip:text;
 color:transparent;
}

.hero{
 text-align:center;
 padding:40px 20px;
}

.hero h1{
 font-size:28px;
}

.hero span{
 color:#22d3ee;
}

.tabs{
 display:flex;
 overflow:auto;
}

.tab{
 padding:10px 15px;
 cursor:pointer;
 background:#0f172a;
 margin:5px;
 border-radius:10px;
}

.active{
 background:#8b5cf6;
}

.section{
 display:none;
 padding:15px;
}

.show{
 display:block;
}

textarea,select,input{
 width:95%;
 padding:10px;
 margin-top:10px;
 border-radius:10px;
 border:none;
}

button{
 width:95%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:10px;
}

.generate{background:#8b5cf6;color:white;}
.copy{background:#22c55e;}
.stop{background:#ef4444;}

.output{
 margin-top:10px;
 background:#0f172a;
 padding:10px;
 border-radius:10px;
}
</style>
</head>

<body>

<nav>
<div class="logo">⚡ Zentrix AI</div>
</nav>

<div class="hero">
<h1>Create Content <span>10x Faster</span></h1>
<p>All-in-one creator toolkit 🚀</p>
</div>

<div class="tabs">
<div class="tab active" onclick="openTab('voice',this)">Voice</div>
<div class="tab" onclick="openTab('script',this)">Script</div>
<div class="tab" onclick="openTab('caption',this)">Caption</div>
<div class="tab" onclick="openTab('idea',this)">Ideas</div>
</div>

<!-- VOICE -->
<div id="voice" class="section show">
<textarea id="text" placeholder="Enter text"></textarea>

<select id="style">
<option value="normal">Normal</option>
<option value="deep">Deep</option>
<option value="soft">Soft</option>
<option value="fast">Fast</option>
<option value="slow">Story</option>
</select>

<button class="generate" onclick="speak()">Generate Voice</button>
<button class="stop" onclick="stop()">Stop</button>
</div>

<!-- SCRIPT -->
<div id="script" class="section">
<input id="topic" placeholder="Enter topic">
<button class="generate" onclick="genScript()">Generate Script</button>
<div id="scriptOut" class="output"></div>
<button class="copy" onclick="copyText('scriptOut')">Copy</button>
</div>

<!-- CAPTION -->
<div id="caption" class="section">
<input id="capInput" placeholder="Enter topic">
<button class="generate" onclick="genCaption()">Generate Caption</button>
<div id="capOut" class="output"></div>
<button class="copy" onclick="copyText('capOut')">Copy</button>
</div>

<!-- IDEA -->
<div id="idea" class="section">
<select id="niche">
<option>Motivation</option>
<option>Horror</option>
<option>Facts</option>
</select>
<button class="generate" onclick="genIdea()">Generate Idea</button>
<div id="ideaOut" class="output"></div>
</div>

<script>

function openTab(id,el){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'));
 document.getElementById(id).classList.add('show');

 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 el.classList.add('active');
}

function speak(){
 let msg=new SpeechSynthesisUtterance(document.getElementById("text").value);
 let style=document.getElementById("style").value;

 if(style=="deep"){msg.pitch=0.6;msg.rate=0.9;}
 if(style=="soft"){msg.pitch=1.5;}
 if(style=="fast"){msg.rate=1.4;}
 if(style=="slow"){msg.rate=0.7;}

 speechSynthesis.cancel();
 speechSynthesis.speak(msg);
}

function stop(){
 speechSynthesis.cancel();
}

function genScript(){
 let t=document.getElementById("topic").value;
 let scripts=[
  `Ek kahani ${t} ke bare me jo tumhe hila degi...`,
  `${t} ka sach jo kisi ne nahi bataya...`,
  `Aaj tum jaanoge ${t} ka hidden truth...`
 ];
 document.getElementById("scriptOut").innerText =
 scripts[Math.floor(Math.random()*scripts.length)];
}

function genCaption(){
 let t=document.getElementById("capInput").value;
 let caps=[
  `Ye ${t} tumhari life badal dega 🔥`,
  `${t} jo tumne kabhi nahi dekha 😱`,
  `Sach me ${t} itna powerful hai 💯`
 ];
 document.getElementById("capOut").innerText =
 caps[Math.floor(Math.random()*caps.length)];
}

function genIdea(){
 let ideas={
  Motivation:["Never give up story","Success habits","Morning routine"],
  Horror:["Haunted road story","Ghost in mirror","Night 2AM story"],
  Facts:["Strange facts","Mind blowing facts","Space mystery"]
 };
 let n=document.getElementById("niche").value;
 let arr=ideas[n];
 document.getElementById("ideaOut").innerText =
 arr[Math.floor(Math.random()*arr.length)];
}

function copyText(id){
 let text=document.getElementById(id).innerText;
 navigator.clipboard.writeText(text);
 alert("Copied!");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Zentrix Voice AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:Arial, sans-serif;
 background:#020617;
 color:white;
 text-align:center;
}

h1{
 margin:20px;
 font-size:28px;
 color:#38bdf8;
}

.container{
 padding:10px;
}

.card{
 background:#0f172a;
 margin:15px;
 padding:20px;
 border-radius:15px;
 box-shadow:0 0 20px rgba(0,0,0,0.5);
}

textarea{
 width:95%;
 height:120px;
 border-radius:10px;
 padding:10px;
 border:none;
 outline:none;
 font-size:16px;
}

.counter{
 font-size:13px;
 color:#94a3b8;
 text-align:right;
 margin-right:10px;
}

select{
 margin:8px;
 padding:10px;
 border-radius:10px;
 border:none;
 width:90%;
}

button{
 margin:8px;
 padding:12px;
 border-radius:12px;
 border:none;
 width:90%;
 font-size:16px;
 font-weight:bold;
}

.generate{
 background:#38bdf8;
 color:black;
}

.stop{
 background:#ef4444;
 color:white;
}

button:hover{
 opacity:0.8;
}

.history{
 max-height:150px;
 overflow:auto;
 text-align:left;
 margin-top:10px;
 font-size:14px;
}

</style>
</head>

<body>

<h1>🎤 Zentrix Voice AI</h1>

<div class="container">

<div class="card">

<textarea id="text" placeholder="Type your text..."></textarea>
<div class="counter" id="counter">0 characters</div>

<select id="voice"></select>

<select id="rate">
<option value="1">Normal Speed</option>
<option value="0.8">Slow</option>
<option value="1.3">Fast</option>
</select>

<select id="pitch">
<option value="1">Normal Pitch</option>
<option value="0.8">Deep</option>
<option value="1.5">Sharp</option>
</select>

<button class="generate" onclick="generate()">🎤 Generate Voice</button>
<button class="stop" onclick="stop()">⛔ Stop</button>

</div>

<div class="card">
<h3>History</h3>
<div id="history" class="history"></div>
</div>

</div>

<script>
let voices=[];

function loadVoices(){
 voices=speechSynthesis.getVoices();
 let v=document.getElementById("voice");
 v.innerHTML="";

 voices.forEach((voice,i)=>{
  let opt=document.createElement("option");
  opt.value=i;
  opt.text=voice.name+" ("+voice.lang+")";
  v.appendChild(opt);
 });
}

speechSynthesis.onvoiceschanged=loadVoices;

function generate(){
 let text=document.getElementById("text").value;
 if(!text) return alert("Enter text");

 let msg=new SpeechSynthesisUtterance(text);
 msg.voice=voices[document.getElementById("voice").value];
 msg.rate=document.getElementById("rate").value;
 msg.pitch=document.getElementById("pitch").value;

 speechSynthesis.cancel();
 speechSynthesis.speak(msg);

 addHistory(text);
}

function stop(){
 speechSynthesis.cancel();
}

function addHistory(text){
 let h=document.getElementById("history");
 let div=document.createElement("div");
 div.textContent="• "+text;
 h.prepend(div);
}

document.getElementById("text").addEventListener("input",()=>{
 document.getElementById("counter").innerText =
 document.getElementById("text").value.length + " characters";
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background: radial-gradient(circle at 10% 10%, #1e1b4b, #020617 70%);
color:white;
padding:15px;
}

/* HEADER */
.header{text-align:center;margin-bottom:20px;}
.logo{
font-size:28px;
font-weight:700;
background:linear-gradient(90deg,#8b5cf6,#6366f1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
.subtitle{opacity:0.7;font-size:13px;}

/* VOICE BOX */
.main-box{
background: linear-gradient(145deg,#0f172a,#020617);
padding:18px;
border-radius:18px;
box-shadow:0 0 25px rgba(99,102,241,0.25);
margin-bottom:20px;
}

textarea{
width:100%;
height:90px;
background:#111827;
border:none;
border-radius:12px;
padding:12px;
color:white;
font-size:14px;
}

select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
background:#111827;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
font-size:14px;
cursor:pointer;
}

.generate{background:linear-gradient(90deg,#7c3aed,#6366f1);color:white;}
.stop{background:#ef4444;color:white;}

/* FEATURES */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background: linear-gradient(145deg,#0f172a,#020617);
padding:14px;
border-radius:14px;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 0 20px rgba(99,102,241,0.6);
}

.icon{
background:#111827;
padding:10px;
border-radius:10px;
color:#6366f1;
}

/* OUTPUT */
.output{
margin-top:15px;
background:#020617;
padding:12px;
border-radius:12px;
min-height:90px;
font-size:14px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">⚡ Zentrix AI</div>
<div class="subtitle">Create Content Faster</div>
</div>

<!-- VOICE SECTION -->
<div class="main-box">

<textarea id="inputText" placeholder="Enter text..."></textarea>

<select id="voiceSelect"></select>

<select id="style">
<option value="normal">Normal</option>
<option value="deep">Deep</option>
<option value="fast">Fast</option>
<option value="slow">Slow</option>
<option value="robot">Robot</option>
</select>

<button class="generate" onclick="generateVoice()">Generate Voice</button>
<button class="stop" onclick="stopVoice()">Stop</button>

</div>

<!-- FEATURES -->
<div class="grid">

<div class="card" onclick="tool('script')"><div class="icon">✍️</div>Script</div>
<div class="card" onclick="tool('caption')"><div class="icon">📝</div>Caption</div>
<div class="card" onclick="tool('idea')"><div class="icon">💡</div>Idea</div>
<div class="card" onclick="tool('title')"><div class="icon">🔥</div>Title</div>
<div class="card" onclick="tool('hook')"><div class="icon">🧠</div>Hook</div>
<div class="card" onclick="tool('hashtag')"><div class="icon">#</div>Hashtag</div>
<div class="card" onclick="tool('rewrite')"><div class="icon">🔁</div>Rewrite</div>
<div class="card" onclick="tool('story')"><div class="icon">📜</div>Story</div>
<div class="card" onclick="tool('keyword')"><div class="icon">🎯</div>Keyword</div>

</div>

<div class="output" id="output">Result will appear here...</div>

<script>

/* VOICE SYSTEM */
let voices = [];

function loadVoices(){
 voices = speechSynthesis.getVoices();
 let select = document.getElementById("voiceSelect");
 select.innerHTML = "";

 voices.forEach((v,i)=>{
  let option = document.createElement("option");
  option.value = i;
  option.text = v.name;
  select.appendChild(option);
 });
}

speechSynthesis.onvoiceschanged = loadVoices;

function generateVoice(){
 let text = inputText.value;
 let voiceIndex = voiceSelect.value;
 let style = document.getElementById("style").value;

 let msg = new SpeechSynthesisUtterance(text);
 msg.voice = voices[voiceIndex];

 if(style=="deep"){msg.pitch=0.6;}
 if(style=="fast"){msg.rate=1.5;}
 if(style=="slow"){msg.rate=0.7;}
 if(style=="robot"){msg.pitch=0.3; msg.rate=1.2;}

 speechSynthesis.cancel();
 speechSynthesis.speak(msg);
}

function stopVoice(){
 speechSynthesis.cancel();
}

/* FEATURES */
function tool(type){
let text=inputText.value;
let out=output;

if(!text){
out.innerHTML="⚠️ Pehle text likh";
return;
}

if(type=="script"){
out.innerHTML="🎬 Script:\nHook: "+text+"...\nMain: Ye ek kahani hai...\nEnd: Follow karo!";
}

if(type=="caption"){
out.innerHTML="🔥 "+text+"\n#viral #reels #trend";
}

if(type=="idea"){
out.innerHTML="💡 Idea: "+text+" par reel banao";
}

if(type=="title"){
out.innerHTML="🔥 "+text+" | Must Watch 😱";
}

if(type=="hook"){
out.innerHTML="🧠 Agar tumne ye nahi dekha to regret karoge!";
}

if(type=="hashtag"){
out.innerHTML="#viral #fyp #shorts";
}

if(type=="rewrite"){
out.innerHTML=text.toUpperCase();
}

if(type=="story"){
out.innerHTML="📖 Ek kahani: "+text+" aur sab badal gaya...";
}

if(type=="keyword"){
out.innerHTML="🎯 "+text+", viral, trending";
}

}

</script>

</body>
</html>

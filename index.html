<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix Voice AI</title>

<style>
body{
 margin:0;
 font-family: 'Segoe UI', sans-serif;
 background: radial-gradient(circle at top, #0f172a, #020617);
 color:white;
 text-align:center;
}

nav{
 display:flex;
 justify-content:space-between;
 padding:15px 20px;
}

.logo{
 font-size:18px;
 font-weight:bold;
 color:#8b5cf6;
}

.btn{
 padding:8px 15px;
 border-radius:20px;
 background:#8b5cf6;
 border:none;
 color:white;
}

.hero{
 padding:40px 20px;
}

.hero h1{
 font-size:28px;
 line-height:1.4;
}

.hero span{
 color:#22d3ee;
}

.card{
 background:#0f172a;
 margin:20px;
 padding:20px;
 border-radius:20px;
 box-shadow:0 0 20px rgba(0,0,0,0.5);
}

textarea{
 width:95%;
 height:120px;
 border-radius:10px;
 padding:10px;
 border:none;
 outline:none;
}

select{
 width:95%;
 padding:10px;
 border-radius:10px;
 margin-top:10px;
}

button{
 margin-top:10px;
 padding:12px;
 border:none;
 border-radius:10px;
 width:95%;
}

.generate{background:#8b5cf6;color:white;}
.stop{background:#ef4444;color:white;}
.download{background:#22c55e;color:black;}

.features{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 padding:10px;
}

.box{
 background:#0f172a;
 padding:15px;
 border-radius:15px;
}

.history{
 max-height:120px;
 overflow:auto;
 text-align:left;
 font-size:14px;
}
</style>
</head>

<body>

<nav>
<div class="logo">⚡ Zentrix AI</div>
<button class="btn">Get Started</button>
</nav>

<div class="hero">
<h1>Create Content <span>10x Faster</span><br>with AI</h1>
<p>Free voice generator for creators 🚀</p>
</div>

<div class="card">

<textarea id="text" placeholder="Type your text..."></textarea>

<select id="style">
<option value="normal">Normal Voice</option>
<option value="deep">Deep Voice</option>
<option value="soft">Soft Voice</option>
<option value="fast">Fast Voice</option>
<option value="slow">Story Voice</option>
</select>

<button class="generate" onclick="generate()">🎤 Generate</button>
<button class="stop" onclick="stop()">⛔ Stop</button>
<button class="download" onclick="downloadAudio()">⬇ Download</button>

</div>

<div class="features">
<div class="box">🎤 Ultra Realistic TTS</div>
<div class="box">✍️ Script Generator</div>
<div class="box">🎬 Video Ideas</div>
<div class="box">🤖 AI Assistant</div>
</div>

<div class="card">
<h3>History</h3>
<div id="history" class="history"></div>
</div>

<script>

function generate(){
 let text=document.getElementById("text").value;
 if(!text) return alert("Enter text");

 let msg=new SpeechSynthesisUtterance(text);
 let style=document.getElementById("style").value;

 if(style==="normal"){msg.rate=1;msg.pitch=1;}
 if(style==="deep"){msg.rate=0.9;msg.pitch=0.6;}
 if(style==="soft"){msg.rate=1;msg.pitch=1.6;}
 if(style==="fast"){msg.rate=1.4;msg.pitch=1;}
 if(style==="slow"){msg.rate=0.7;msg.pitch=0.9;}

 speechSynthesis.cancel();
 speechSynthesis.speak(msg);

 addHistory(text);
}

function stop(){
 speechSynthesis.cancel();
}

function downloadAudio(){
 alert("⚠️ Download direct possible nahi hai.\n👉 Screen record use karo 📱");
}

function addHistory(text){
 let h=document.getElementById("history");
 let div=document.createElement("div");
 div.textContent="• "+text;
 h.prepend(div);
}

</script>

</body>
</html>

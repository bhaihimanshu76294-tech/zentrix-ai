<!DOCTYPE html>
<html>
<head>
<title>Zentrix AI Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0b1a3a, #000);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.container {
  margin: 20px;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
}

textarea {
  width: 90%;
  height: 100px;
  border-radius: 10px;
  padding: 10px;
  border: none;
}

select, button {
  margin: 8px;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: cyan;
  color: black;
  font-weight: bold;
}

</style>
</head>

<body>

<h1>Zentrix AI 🔥</h1>

<div class="container">

<textarea id="text" placeholder="Type your text..."></textarea><br>

<select id="voiceSelect"></select><br>

<select id="rate">
  <option value="1">Normal</option>
  <option value="0.8">Slow</option>
  <option value="1.3">Fast</option>
</select>

<select id="pitch">
  <option value="1">Normal</option>
  <option value="0.8">Deep</option>
  <option value="1.5">Sharp</option>
</select>

<br>

<button onclick="speak()">🎤 Generate</button>
<button onclick="stop()">⛔ Stop</button>

</div>

<script>
let voices = [];

function loadVoices() {
  voices = speechSynthesis.getVoices();
  let select = document.getElementById("voiceSelect");
  select.innerHTML = "";

  voices.forEach((v, i) => {
    let option = document.createElement("option");
    option.value = i;
    option.text = v.name + " (" + v.lang + ")";
    select.appendChild(option);
  });
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak() {
  let text = document.getElementById("text").value;
  let voiceIndex = document.getElementById("voiceSelect").value;
  let rate = document.getElementById("rate").value;
  let pitch = document.getElementById("pitch").value;

  let msg = new SpeechSynthesisUtterance(text);
  msg.voice = voices[voiceIndex];
  msg.rate = rate;
  msg.pitch = pitch;

  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

function stop() {
  speechSynthesis.cancel();
}
</script>

</body>
</html>

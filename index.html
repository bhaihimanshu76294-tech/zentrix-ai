<!DOCTYPE html>
<html>
<head>
  <title>Zentrix AI Voice</title>
  <style>
    body {
      background: #0b1a3a;
      color: white;
      text-align: center;
      font-family: sans-serif;
      padding: 30px;
    }
    textarea {
      width: 90%;
      height: 120px;
      border-radius: 10px;
      padding: 10px;
      margin: 10px;
    }
    select, button {
      padding: 10px;
      margin: 8px;
      border-radius: 10px;
      border: none;
    }
    button {
      background: green;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Zentrix AI Voice 🔥</h1>

<textarea id="text" placeholder="Type text here..."></textarea><br>

<select id="language" onchange="loadVoices()">
  <option value="en">English (Best 🔥)</option>
  <option value="hi">Hindi</option>
</select><br>

<select id="voiceSelect"></select><br>

<select id="rate">
  <option value="1">Normal Speed</option>
  <option value="0.8">Slow</option>
  <option value="1.3">Fast</option>
</select>

<select id="pitch">
  <option value="1">Normal Voice</option>
  <option value="0.8">Deep</option>
  <option value="1.5">Sharp</option>
</select>

<br>

<button onclick="speak()">Generate Voice</button>

<script>
let allVoices = [];

function loadVoices() {
  allVoices = speechSynthesis.getVoices();
  let lang = document.getElementById("language").value;
  let voiceSelect = document.getElementById("voiceSelect");

  voiceSelect.innerHTML = "";

  let filtered = allVoices.filter(v => v.lang.startsWith(lang));

  filtered.forEach((voice, i) => {
    let option = document.createElement("option");
    option.value = i;
    option.text = voice.name;
    voiceSelect.appendChild(option);
  });

  // Auto select best voice
  let best = filtered.findIndex(v => v.name.toLowerCase().includes("google") || v.name.toLowerCase().includes("english"));
  if (best >= 0) voiceSelect.value = best;
}

speechSynthesis.onvoiceschanged = loadVoices;

function speak() {
  let text = document.getElementById("text").value;
  let voiceIndex = document.getElementById("voiceSelect").value;
  let rate = document.getElementById("rate").value;
  let pitch = document.getElementById("pitch").value;

  let voices = speechSynthesis.getVoices();
  let lang = document.getElementById("language").value;

  let filtered = voices.filter(v => v.lang.startsWith(lang));

  let speech = new SpeechSynthesisUtterance(text);
  speech.voice = filtered[voiceIndex];
  speech.rate = rate;
  speech.pitch = pitch;

  speechSynthesis.speak(speech);
}
</script>

</body>
</html>

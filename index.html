<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zentrix AI PRO</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
}
.container{padding:20px;}
h1{text-align:center;color:#8f7cff;}

textarea{
width:100%;
height:100px;
border-radius:10px;
padding:10px;
border:none;
}

button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

.generate{background:#6c63ff;color:white;}
.stop{background:red;color:white;}
.download{background:green;color:white;}

.features{
display:flex;
flex-direction:column;
gap:10px;
margin-top:20px;
}

.feature{
background:#111827;
padding:15px;
border-radius:12px;
cursor:pointer;
}

#output{
margin-top:20px;
background:#111;
padding:15px;
border-radius:10px;
white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Zentrix AI PRO</h1>

<textarea id="text" placeholder="Enter topic..."></textarea>

<button class="generate" onclick="speak()">🔊 Voice</button>
<button class="stop" onclick="stopVoice()">⛔ Stop</button>
<button class="download" onclick="download()">⬇ Download</button>

<div class="features">

<div class="feature" onclick="gen('story')">📜 Story</div>
<div class="feature" onclick="gen('script')">✍ Script</div>
<div class="feature" onclick="gen('caption')">📝 Caption</div>
<div class="feature" onclick="gen('title')">🔥 Title</div>
<div class="feature" onclick="gen('hook')">🧠 Hook</div>
<div class="feature" onclick="gen('hashtag')"># Hashtag</div>
<div class="feature" onclick="gen('idea')">💡 Idea</div>
<div class="feature" onclick="gen('motivation')">💪 Motivation</div>
<div class="feature" onclick="gen('dialogue')">🎭 Dialogue</div>
<div class="feature" onclick="gen('bio')">📌 Bio</div>
<div class="feature" onclick="gen('intro')">🎬 Intro</div>
<div class="feature" onclick="gen('outro')">🏁 Outro</div>
<div class="feature" onclick="gen('viral')">🚀 Viral Line</div>
<div class="feature" onclick="gen('facts')">📊 Facts</div>
<div class="feature" onclick="gen('question')">❓ Question</div>
<div class="feature" onclick="gen('short')">📱 Shorts</div>
<div class="feature" onclick="gen('headline')">📰 Headline</div>
<div class="feature" onclick="gen('cta')">📣 CTA</div>

</div>

<div id="output">Result yaha dikhega...</div>

</div>

<script>

// 🎤 Voice
function speak(){
let msg=new SpeechSynthesisUtterance(text.value);
speechSynthesis.speak(msg);
}
function stopVoice(){speechSynthesis.cancel();}

// 😂 Popup
function download(){
showPopup("😂 Screen record kar le bhai!\n— Himanshu Gupta 😎");
}
function showPopup(msg){
let d=document.createElement("div");
d.innerHTML=`<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:#111;padding:20px;border-radius:10px;text-align:center;">
<p>${msg}</p>
<button onclick="this.parentElement.remove()">OK</button></div>`;
document.body.appendChild(d);
}

// 🧠 DATA (AI JUGAAD)
let horror=[
"Raat ke 2 baje darwaza khula aur koi andar aaya...",
"Andhere jungle me kisi ne uska naam liya...",
"Purane ghar me awaaz aati thi jo kisi ko nahi sunai deti thi..."
];

let love=[
"Ek ladka tha jo use chupke se dekhta tha...",
"Unki mulaqat ek din achanak hui aur sab badal gaya...",
"Pehla pyar kabhi bhulaya nahi jata..."
];

let motivation=[
"Zindagi me kabhi haar mat mano...",
"Jo ruk gaya wo haar gaya...",
"Success unhe milti hai jo try karte rehte hain..."
];

// 🎯 GENERATOR
function gen(type){

let input=document.getElementById("text").value.toLowerCase();
let out=document.getElementById("output");

if(!input){
out.innerText="⚠️ Topic likh bhai!";
return;
}

let result="";

// STORY SMART
if(type=="story"){
if(input.includes("horror")){
result=horror[Math.floor(Math.random()*horror.length)];
}
else if(input.includes("love")){
result=love[Math.floor(Math.random()*love.length)];
}
else{
result=motivation[Math.floor(Math.random()*motivation.length)];
}
}

// SCRIPT
if(type=="script"){
result="🎬 Hook:\nKya aap jante ho "+input+"?\n\n📖 Story:\n"+genRandom()+"\n\n🎯 End:\nFollow karo!";
}

// CAPTION
if(type=="caption"){
result=input+" 😍🔥\nFollow for more!\n#viral #reels #fyp";
}

// TITLE
if(type=="title"){
result="🔥 "+input.toUpperCase()+" | Must Watch 😱";
}

// HOOK
if(type=="hook"){
result="😱 Agar tumne ye nahi dekha to regret karoge!";
}

// HASHTAG
if(type=="hashtag"){
result=input.split(" ").map(w=>"#"+w).join(" ");
}

// IDEA
if(type=="idea"){
result="💡 "+input+" par ek viral reel banao!";
}

// MOTIVATION
if(type=="motivation"){
result=motivation[Math.floor(Math.random()*motivation.length)];
}

// DIALOGUE
if(type=="dialogue"){
result="🎭 'Tum samajh nahi paoge... "+input+"'";
}

// BIO
if(type=="bio"){
result="📌 Creator | "+input+" | Follow now 🚀";
}

// EXTRA FEATURES
if(type=="intro") result="🎬 Welcome! Aaj hum baat karenge "+input;
if(type=="outro") result="🙏 Thanks for watching! Like Share Subscribe!";
if(type=="viral") result="🚀 Ye video viral hone wala hai: "+input;
if(type=="facts") result="📊 Fact: "+input+" interesting hai!";
if(type=="question") result="❓ Kya aap jante ho "+input+"?";
if(type=="short") result="📱 Short idea: "+input;
if(type=="headline") result="📰 Breaking: "+input;
if(type=="cta") result="📣 Abhi follow karo!";

// helper
function genRandom(){
return horror.concat(love,motivation)[Math.floor(Math.random()*9)];
}

out.innerText=result;

}

</script>

</body>
</html>

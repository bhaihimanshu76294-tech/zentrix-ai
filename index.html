<!DOCTYPE html>
<html>
<head>
  <title>Zentrix AI Voice</title>
</head>
<body style="background:#0b1a3a;color:white;text-align:center;padding:50px;">

<h1>Zentrix AI Voice</h1>

<textarea id="text" placeholder="Yaha text likho..." style="width:80%;height:100px;"></textarea><br><br>

<button onclick="speak()" style="padding:10px 20px;background:green;color:white;">Generate Voice</button>

<script>
function speak(){
  let text = document.getElementById("text").value;
  let speech = new SpeechSynthesisUtterance(text);
  speech.lang = "hi-IN";
  window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>

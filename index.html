<!DOCTYPE html>
<html>
<head>
<title>Zentrix Voice AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:Arial;
 background:#020617;
 color:white;
 text-align:center;
}

h1{
 margin:20px;
 color:#38bdf8;
}

.card{
 background:#0f172a;
 margin:15px;
 padding:20px;
 border-radius:15px;
}

textarea{
 width:95%;
 height:120px;
 border-radius:10px;
 padding:10px;
 border:none;
 outline:none;
}

select,button{
 margin:8px;
 padding:12px;
 border-radius:10px;
 border:none;
 width:90%;
}

.generate{background:#38bdf8;color:black;}
.stop{background:#ef4444;color:white;}
.download{background:#22c55e;color:black;}

.history{
 max-height:150px;
 overflow:auto;
 text-align:left;
 font-size:14px;
}
</style>
</head>

<body>

<h1>🎤 Zentrix Voice AI</h1>

<div class="card">

<textarea id="text" placeholder="Type text..."></textarea>

<select id="style">
<option value="normal">Normal Voice</option>
<option value="deep">Deep Male</option>
<option value="soft">Soft Female</option>
<option value="fast">Fast Voice</option>
<option value="slow">Story Voice</option>
</select>

<button class="generate" onclick="generate()">🎤 Generate</button>
<button class="stop" onclick="stop()">⛔ Stop</button>
<button class="download" onclick="downloadAudio()">⬇ Download</button>

</div>

<div class="card">
<h3>History</h3>
<div id="history" class="history"></div>
</div>

<script>

function generate(){

 let text=document.getElementById("text").value;
 if(!text) return alert("Enter text");

 let msg=new SpeechSynthesisUtterance(text);

 let style=document.getElementById("style").value;

 if(style==="normal"){
   msg.rate=1;
   msg.pitch=1;
 }

 if(style==="deep"){
   msg.rate=0.9;
   msg.pitch=0.6;
 }

 if(style==="soft"){
   msg.rate=1;
   msg.pitch=1.6;
 }

 if(style==="fast"){
   msg.rate=1.4;
   msg.pitch=1.1;
 }

 if(style==="slow"){
   msg.rate=0.7;
   msg.pitch=0.9;
 }

 speechSynthesis.cancel();
 speechSynthesis.speak(msg);

 addHistory(text);
}

function stop(){
 speechSynthesis.cancel();
}

function downloadAudio(){
 alert("⚠️ Audio download direct possible nahi hai.\n\n👉 Screen Recorder use karke save karo 📱");
}

function addHistory(text){
 let h=document.getElementById("history");
 let div=document.createElement("div");
 div.textContent="• "+text;
 h.prepend(div);
}

</script>

</body>
</html>

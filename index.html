<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: radial-gradient(circle at 10% 10%, #1e1b4b, #020617 70%);
color:white;
padding:15px;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:25px;
}

.logo{
font-size:30px;
font-weight:700;
background: linear-gradient(90deg,#8b5cf6,#6366f1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
opacity:0.7;
font-size:14px;
}

/* MAIN BOX */
.main-box{
background: linear-gradient(145deg,#0f172a,#020617);
padding:20px;
border-radius:20px;
box-shadow:0 0 30px rgba(99,102,241,0.25);
margin-bottom:20px;
backdrop-filter:blur(10px);
}

textarea{
width:100%;
height:100px;
background:#111827;
border:none;
border-radius:12px;
padding:12px;
color:white;
font-size:15px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.generate{
background:linear-gradient(90deg,#7c3aed,#6366f1);
color:white;
}

.generate:hover{
opacity:0.8;
}

.stop{
background:#ef4444;
color:white;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
background: linear-gradient(145deg,#0f172a,#020617);
padding:16px;
border-radius:16px;
display:flex;
align-items:center;
gap:12px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 30px rgba(99,102,241,0.6);
}

.icon{
background:#111827;
padding:12px;
border-radius:12px;
color:#6366f1;
font-size:18px;
}

/* OUTPUT */
.output{
margin-top:20px;
background:#020617;
padding:15px;
border-radius:14px;
min-height:100px;
font-size:14px;
line-height:1.5;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="header">
<div class="logo">⚡ Zentrix AI</div>
<div class="subtitle">Create Content Like Pro</div>
</div>

<div class="main-box">
<textarea id="inputText" placeholder="Enter your text..."></textarea>

<button class="btn generate" onclick="generate()">Generate</button>
<button class="btn stop" onclick="stopVoice()">Stop</button>
</div>

<div class="grid">

<div class="card" onclick="tool('script')"><div class="icon">✍️</div>Script</div>
<div class="card" onclick="tool('caption')"><div class="icon">📝</div>Caption</div>
<div class="card" onclick="tool('idea')"><div class="icon">💡</div>Idea</div>
<div class="card" onclick="tool('title')"><div class="icon">🔥</div>Title</div>
<div class="card" onclick="tool('hook')"><div class="icon">🧠</div>Hook</div>
<div class="card" onclick="tool('hashtag')"><div class="icon">#</div>Hashtag</div>
<div class="card" onclick="tool('rewrite')"><div class="icon">🔁</div>Rewrite</div>
<div class="card" onclick="tool('story')"><div class="icon">📜</div>Story</div>
<div class="card" onclick="tool('keyword')"><div class="icon">🎯</div>Keyword</div>

</div>

<div class="output" id="output">
Result will appear here...
</div>

<script>

function generate(){
let text=document.getElementById("inputText").value;
let msg=new SpeechSynthesisUtterance(text);
speechSynthesis.speak(msg);
}

function stopVoice(){
speechSynthesis.cancel();
}

function tool(type){
let text=document.getElementById("inputText").value;
let out=document.getElementById("output");

if(!text){
out.innerHTML="⚠️ Pehle text likh";
return;
}

if(type=="script"){
out.innerHTML="🎬 Script:\nHook: "+text+"...\nMain: Ye ek interesting kahani hai...\nEnd: Follow karo!";
}

if(type=="caption"){
out.innerHTML="🔥 "+text+"\n#viral #reels #trending";
}

if(type=="idea"){
out.innerHTML="💡 Reel idea: "+text+" explain karo";
}

if(type=="title"){
out.innerHTML="🔥 "+text+" | Must Watch 😱";
}

if(type=="hook"){
out.innerHTML="🧠 Agar tumne ye nahi dekha to regret karoge!";
}

if(type=="hashtag"){
out.innerHTML="#viral #fyp #trend #shorts";
}

if(type=="rewrite"){
out.innerHTML=text.toUpperCase();
}

if(type=="story"){
out.innerHTML="📖 Ek kahani: "+text+" aur sab badal gaya...";
}

if(type=="keyword"){
out.innerHTML="🎯 "+text+", viral, trending";
}

}

</script>

</body>
</html>

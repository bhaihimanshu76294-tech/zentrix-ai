<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix AI</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background: radial-gradient(circle at top,#1e1b4b,#020617);
 color:white;
}

.logo{
 text-align:center;
 padding:15px;
 font-weight:bold;
 font-size:20px;
 color:#8b5cf6;
}

.hero{
 text-align:center;
 padding:20px;
}

.features{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 padding:10px;
}

.box{
 background:#0f172a;
 padding:15px;
 border-radius:10px;
 cursor:pointer;
}

.section{
 display:none;
 padding:10px;
}

.show{display:block;}

textarea,input,select{
 width:95%;
 padding:10px;
 margin-top:10px;
 border-radius:8px;
 border:none;
}

button{
 width:95%;
 padding:10px;
 margin-top:10px;
 border:none;
 border-radius:8px;
}

.generate{background:#8b5cf6;color:white;}
.stop{background:red;color:white;}
.copy{background:green;color:white;}

.output{
 background:#0f172a;
 margin-top:10px;
 padding:10px;
 border-radius:10px;
}
</style>
</head>

<body>

<div class="logo">⚡ Zentrix AI</div>

<div class="hero">
<h2>Create Content 10x Faster</h2>
</div>

<!-- FEATURES -->
<div class="features">
<div class="box" onclick="openTool('voice')">🎤 Voice</div>
<div class="box" onclick="openTool('script')">✍️ Script</div>
<div class="box" onclick="openTool('caption')">📝 Caption</div>
<div class="box" onclick="openTool('idea')">💡 Ideas</div>

<div class="box" onclick="openTool('script')">🔥 Title</div>
<div class="box" onclick="openTool('script')">🧠 Hook</div>
<div class="box" onclick="openTool('caption')"># Hashtag</div>
<div class="box" onclick="openTool('script')">🔁 Rewrite</div>

<div class="box" onclick="openTool('script')">📜 Story</div>
<div class="box" onclick="openTool('idea')">🎬 Video Idea</div>
<div class="box" onclick="openTool('caption')">📊 Tips</div>
<div class="box" onclick="openTool('script')">🔤 Text Tool</div>

<div class="box" onclick="openTool('script')">⏱ Time</div>
<div class="box" onclick="openTool('caption')">🎯 Keyword</div>
</div>

<!-- VOICE -->
<div id="voice" class="section show">
<textarea id="text" placeholder="Enter text"></textarea>
<select id="style">
<option value="normal">Normal</option>
<option value="deep">Deep</option>
<option value="fast">Fast</option>
<option value="slow">Slow</option>
</select>

<button class="generate" onclick="speak()">Generate</button>
<button class="stop" onclick="stop()">Stop</button>
</div>

<!-- SCRIPT -->
<div id="script" class="section">
<input id="topic" placeholder="Enter topic">
<button class="generate" onclick="genScript()">Generate</button>
<div id="scriptOut" class="output"></div>
<button class="copy" onclick="copyText('scriptOut')">Copy</button>
</div>

<!-- CAPTION -->
<div id="caption" class="section">
<input id="capInput" placeholder="Enter topic">
<button class="generate" onclick="genCaption()">Generate</button>
<div id="capOut" class="output"></div>
<button class="copy" onclick="copyText('capOut')">Copy</button>
</div>

<!-- IDEA -->
<div id="idea" class="section">
<select id="niche">
<option>Motivation</option>
<option>Horror</option>
<option>Facts</option>
</select>
<button class="generate" onclick="genIdea()">Generate</button>
<div id="ideaOut" class="output"></div>
</div>

<script>

function openTool(id){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('show'));
 document.getElementById(id).classList.add('show');
 window.scrollTo(0,document.body.scrollHeight);
}

function speak(){
 let msg=new SpeechSynthesisUtterance(document.getElementById("text").value);
 let s=document.getElementById("style").value;

 if(s=="deep"){msg.pitch=0.6;}
 if(s=="fast"){msg.rate=1.4;}
 if(s=="slow"){msg.rate=0.7;}

 speechSynthesis.cancel();
 speechSynthesis.speak(msg);
}

function stop(){speechSynthesis.cancel();}

function genScript(){
 let t=document.getElementById("topic").value;
 let arr=[
  "Tumhe yakeen nahi hoga "+t,
  t+" ka sach kya hai",
  "Aaj tum jaanoge "+t
 ];
 document.getElementById("scriptOut").innerText=arr[Math.floor(Math.random()*3)];
}

function genCaption(){
 let t=document.getElementById("capInput").value;
 let arr=[
  t+" ne sab badal diya 🔥",
  "Ye "+t+" viral hai 😱",
  t+" powerful hai 💯"
 ];
 document.getElementById("capOut").innerText=arr[Math.floor(Math.random()*3)];
}

function genIdea(){
 let arr=["Amazing idea","Viral reel idea","New concept"];
 document.getElementById("ideaOut").innerText=arr[Math.floor(Math.random()*3)];
}

function copyText(id){
 let text=document.getElementById(id).innerText;
 navigator.clipboard.writeText(text);
 alert("Copied!");
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Zentrix AI PRO</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
}

.container{padding:20px;}

h1{text-align:center;color:#8f7cff;}

textarea{
width:100%;
height:100px;
border-radius:10px;
padding:10px;
border:none;
}

select,button{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
}

.generate{background:#6c63ff;color:white;}
.stop{background:red;color:white;}
.download{background:green;color:white;}

/* 🔥 Balanced Layout */
.features{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.feature{
background:#111827;
padding:15px;
border-radius:12px;
cursor:pointer;
text-align:center;
}

#output{
margin-top:20px;
background:#111;
padding:15px;
border-radius:10px;
white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Zentrix AI PRO</h1>

<textarea id="text" placeholder="Enter topic..."></textarea>

<select id="voiceType">
<option value="1">Normal</option>
<option value="0.7">Slow</option>
<option value="0.6">Deep</option>
<option value="1.3">Fast</option>
</select>

<button class="generate" onclick="speak()">🔊 Voice</button>
<button class="stop" onclick="stopVoice()">⛔ Stop</button>
<button class="download" onclick="download()">⬇ Download</button>

<div class="features">

<div class="feature" onclick="gen('story')">📜 Story</div>
<div class="feature" onclick="gen('script')">✍ Script</div>
<div class="feature" onclick="gen('caption')">📝 Caption</div>
<div class="feature" onclick="gen('title')">🔥 Title</div>
<div class="feature" onclick="gen('hook')">🧠 Hook</div>
<div class="feature" onclick="gen('hashtag')"># Hashtag</div>
<div class="feature" onclick="gen('idea')">💡 Idea</div>
<div class="feature" onclick="gen('motivation')">💪 Motivation</div>
<div class="feature" onclick="gen('dialogue')">🎭 Dialogue</div>
<div class="feature" onclick="gen('bio')">📌 Bio</div>

</div>

<div id="output">Result yaha dikhega...</div>

</div>

<script>

// 🎤 VOICE CONTROL
function speak(){
let msg=new SpeechSynthesisUtterance(text.value);
msg.rate=document.getElementById("voiceType").value;
speechSynthesis.speak(msg);
}

function stopVoice(){
speechSynthesis.cancel();
}

// 😂 DOWNLOAD POPUP
function download(){
alert("😂 Screen record kar le bhai!\n— Himanshu Gupta 😎");
}

// 🧠 DATA (10-10 STORIES)

// HORROR (10)
let horror=[
"Raat ke 2 baje darwaza khula...",
"Andhere jungle me awaaz aayi...",
"Ek purane ghar me roshni jali...",
"Kisi ne uska naam liya...",
"Darwaza khud se band ho gaya...",
"Raat bhar koi dekh raha tha...",
"Footsteps sunai diye...",
"Kisi ka saya dikh raha tha...",
"Mirror me kuch alag dikh raha tha...",
"Akhri call uski zindagi badal gayi..."
];

// LOVE (10)
let love=[
"Ek ladka use chupke dekhta tha...",
"Unki mulaqat achanak hui...",
"Pehla pyar kabhi nahi bhulta...",
"Wo uska intezar karta raha...",
"Ek chhoti si smile ne sab badal diya...",
"Usne kabhi apne dil ki baat nahi kahi...",
"Ek din wo door chali gayi...",
"Unki kahani adhuri reh gayi...",
"Pyar me sab kuch mumkin hai...",
"Wo sirf uske liye jeeta tha..."
];

// MOTIVATION (10)
let motivation=[
"Kabhi haar mat mano...",
"Jo ruk gaya wo haar gaya...",
"Success mehnat se milti hai...",
"Zindagi ek challenge hai...",
"Har din ek nayi shuruaat hai...",
"Khud par bharosa rakho...",
"Failure success ka part hai...",
"Aaj nahi to kal milega...",
"Consistency hi key hai...",
"Dream big, work hard..."
];

// 🎯 GENERATOR
function gen(type){

let input=document.getElementById("text").value.toLowerCase();
let out=document.getElementById("output");

if(!input){
out.innerText="⚠️ Topic likh bhai!";
return;
}

let result="";

// STORY
if(type=="story"){
if(input.includes("horror")) result=random(horror);
else if(input.includes("love")) result=random(love);
else result=random(motivation);
}

// SCRIPT
if(type=="script"){
result="🎬 Hook:\nKya aap jante ho "+input+"?\n\n📖 Story:\n"+random(horror.concat(love,motivation))+"\n\n🎯 End:\nFollow karo!";
}

// CAPTION
if(type=="caption"){
result=input+" 😍🔥\nFollow for more!\n#viral #reels";
}

// TITLE
if(type=="title"){
result="🔥 "+input.toUpperCase()+" | Must Watch 😱";
}

// HOOK
if(type=="hook"){
result="😱 Ye dekhkar hairaan reh jaoge!";
}

// HASHTAG
if(type=="hashtag"){
result=input.split(" ").map(w=>"#"+w).join(" ");
}

// IDEA
if(type=="idea"){
result="💡 "+input+" par reel banao!";
}

// MOTIVATION
if(type=="motivation"){
result=random(motivation);
}

// DIALOGUE
if(type=="dialogue"){
result="🎭 'Tum samajh nahi paoge... "+input+"'";
}

// BIO
if(type=="bio"){
result="📌 Creator | "+input+" | Follow now 🚀";
}

// helper
function random(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

out.innerText=result;

}

</script>

</body>
</html>

<script>

/* VOICE SYSTEM */
let voices = [];

function loadVoices(){
 voices = speechSynthesis.getVoices();
 let select = document.getElementById("voiceSelect");
 if(!select) return;
 select.innerHTML = "";

 voices.forEach((v,i)=>{
  let option = document.createElement("option");
  option.value = i;
  option.text = v.name;
  select.appendChild(option);
 });
}

speechSynthesis.onvoiceschanged = loadVoices;

function generateVoice(){
 let text = document.getElementById("inputText").value;
 let voiceIndex = document.getElementById("voiceSelect").value;
 let style = document.getElementById("style").value;

 let msg = new SpeechSynthesisUtterance(text);
 msg.voice = voices[voiceIndex];

 if(style=="deep"){ msg.pitch = 0.6; }
 if(style=="fast"){ msg.rate = 1.5; }
 if(style=="slow"){ msg.rate = 0.7; }
 if(style=="robot"){ msg.pitch = 0.3; msg.rate = 1.2; }

 speechSynthesis.cancel();
 speechSynthesis.speak(msg);
}

function stopVoice(){
 speechSynthesis.cancel();
}


/* FEATURES FIX (MAIN PART) */
function tool(type){
 let text = document.getElementById("inputText").value.trim();
 let out = document.getElementById("output");

 if(!text){
  out.innerHTML="⚠️ Pehle text likh";
  return;
 }

 switch(type){

  case "script":
   out.innerHTML =
   "🎬 Hook:\nKya aap jante ho " + text + "?\n\n" +
   "📖 Story:\nAaj hum baat karenge " + text + " ke bare me...\n\n" +
   "🎯 Ending:\nFollow karo aur aur videos dekho!";
  break;

  case "caption":
   out.innerHTML =
   "🔥 " + text + "\n\nFollow for more 🔥\n#viral #reels #fyp #trend";
  break;

  case "idea":
   out.innerHTML =
   "💡 Idea:\nEk reel banao jisme tum " + text + " ko simple tarike se samjhao.";
  break;

  case "title":
   out.innerHTML =
   "🔥 " + text + " | Aisa Sach Jo Sabko Pata Nahi 😱";
  break;

  case "hook":
   out.innerHTML =
   "🧠 Agar tumne ye nahi dekha to tum bahut kuch miss kar rahe ho!";
  break;

  case "hashtag":
   out.innerHTML =
   "#viral #trend #fyp #reels #shorts #explore #video";
  break;

  case "rewrite":
   out.innerHTML =
   "🔁 Simple version:\n" + text + " ko asaan shabdon me samjha ja sakta hai.";
  break;

  case "story":
   out.innerHTML =
   "📖 Ek kahani:\nEk din " + text + " hua... aur uske baad sab badal gaya...";
  break;

  case "keyword":
   out.innerHTML =
   "🎯 Keywords:\n" + text + ", viral, trending, reels, content";
  break;

  default:
   out.innerHTML = "Error";
 }

}

</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentrix AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background: radial-gradient(circle at top,#1e1b4b,#020617 70%);
color:white;
padding:15px;
}

.logo{
text-align:center;
font-size:26px;
font-weight:700;
margin-bottom:15px;
background:linear-gradient(90deg,#8b5cf6,#6366f1);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.box{
background:#0f172a;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

textarea,select,button{
width:100%;
margin-top:8px;
padding:10px;
border-radius:10px;
border:none;
}

textarea{background:#111827;color:white;}

.generate{background:#6366f1;color:white;}
.stop{background:red;color:white;}
.download{background:#22c55e;color:white;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:#0f172a;
padding:12px;
border-radius:12px;
cursor:pointer;
}

.output{
margin-top:15px;
background:#020617;
padding:12px;
border-radius:10px;
min-height:80px;
white-space:pre-line;
}
</style>
</head>

<body>

<div class="logo">⚡ Zentrix AI</div>

<div class="box">
<textarea id="text" placeholder="Enter text..."></textarea>

<select id="voice"></select>

<select id="style">
<option value="normal">Normal</option>
<option value="fast">Fast</option>
<option value="slow">Slow</option>
<option value="deep">Deep</option>
</select>

<button class="generate" onclick="speak()">Generate Voice</button>
<button class="stop" onclick="stop()">Stop</button>
<button class="download" onclick="download()">Download</button>
</div>

<div class="grid">

<div class="card" onclick="tool('script')">✍️ Script</div>
<div class="card" onclick="tool('caption')">📝 Caption</div>
<div class="card" onclick="tool('idea')">💡 Idea</div>
<div class="card" onclick="tool('title')">🔥 Title</div>
<div class="card" onclick="tool('hook')">🧠 Hook</div>
<div class="card" onclick="tool('hashtag')"># Hashtag</div>
<div class="card" onclick="tool('story')">📜 Story</div>
<div class="card" onclick="tool('keyword')">🎯 Keyword</div>
<div class="card" onclick="tool('intro')">🎬 Intro</div>
<div class="card" onclick="tool('outro')">🏁 Outro</div>
<div class="card" onclick="tool('short')">📱 Shorts</div>
<div class="card" onclick="tool('viral')">🚀 Viral Line</div>
<div class="card" onclick="tool('question')">❓ Question</div>
<div class="card" onclick="tool('facts')">📊 Facts</div>
<div class="card" onclick="tool('motivation')">💪 Motivation</div>
<div class="card" onclick="tool('dialogue')">🎭 Dialogue</div>
<div class="card" onclick="tool('comment')">💬 Comment Reply</div>
<div class="card" onclick="tool('bio')">📌 Bio</div>
<div class="card" onclick="tool('headline')">📰 Headline</div>
<div class="card" onclick="tool('cta')">📢 CTA</div>

</div>

<div class="output" id="out">Result yaha dikhega...</div>

<script>

/* VOICE */
let voices=[];
speechSynthesis.onvoiceschanged=()=>{
voices=speechSynthesis.getVoices();
voice.innerHTML="";
voices.forEach((v,i)=>{
let o=document.createElement("option");
o.value=i;
o.text=v.name;
voice.appendChild(o);
});
};

function speak(){
let msg=new SpeechSynthesisUtterance(text.value);
msg.voice=voices[voice.value];

if(style.value=="fast") msg.rate=1.5;
if(style.value=="slow") msg.rate=0.7;
if(style.value=="deep") msg.pitch=0.6;

speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

function stop(){speechSynthesis.cancel();}

/* DOWNLOAD (NO EMAIL) */
function download(){
alert("😂 Screen record kar le bhai!\n— Himanshu Gupta 😎");
}

/* FEATURES */
function tool(t){
let txt=text.value;
if(!txt){out.innerHTML="Text likh bhai";return;}

switch(t){
case "script": out.innerHTML="Hook: "+txt+"...\nStory...\nEnd..."; break;
case "caption": out.innerHTML=txt+"\n#viral #fyp"; break;
case "idea": out.innerHTML="Idea: "+txt+" explain karo"; break;
case "title": out.innerHTML=txt+" | Must Watch 😱"; break;
case "hook": out.innerHTML="Agar ye nahi dekha to regret karoge!"; break;
case "hashtag": out.innerHTML="#viral #trend #shorts"; break;
case "story": out.innerHTML="Ek din "+txt+" hua..."; break;
case "keyword": out.innerHTML=txt+", viral, trending"; break;
case "intro": out.innerHTML="Welcome guys! Aaj hum baat karenge "+txt; break;
case "outro": out.innerHTML="Thanks for watching! Follow karo"; break;
case "short": out.innerHTML="Short idea: "+txt; break;
case "viral": out.innerHTML="Ye cheez sabko nahi pata! "+txt; break;
case "question": out.innerHTML="Kya aap jante ho "+txt+"?"; break;
case "facts": out.innerHTML="Fact: "+txt; break;
case "motivation": out.innerHTML="Kabhi give up mat karo! "+txt; break;
case "dialogue": out.innerHTML="Dialogue: "+txt; break;
case "comment": out.innerHTML="Nice bro! "+txt; break;
case "bio": out.innerHTML="Bio: "+txt; break;
case "headline": out.innerHTML="Breaking: "+txt; break;
case "cta": out.innerHTML="Like share subscribe! "+txt; break;
}
}

</script>

</body>
</html>
